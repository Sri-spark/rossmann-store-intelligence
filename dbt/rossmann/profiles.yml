# dbt connection profile. All secrets come from environment variables so
# nothing sensitive is committed. POSTGRES_HOST is `postgres` inside the
# compose network and `localhost` when running dbt from the host.
rossmann:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | as_number }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_WAREHOUSE_DB', 'warehouse') }}"
      schema: public
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
