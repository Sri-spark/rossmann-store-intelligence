version: 2

models:
  - name: dim_store
    description: "Store dimension."
    columns:
      - name: store_key
        description: "Primary key — store identifier."
        tests: [not_null, unique]
      - name: assortment_name
        tests:
          - accepted_values:
              values: ['basic', 'extra', 'extended', 'unknown']

  - name: dim_date
    description: "Date dimension, one row per calendar day in the fact."
    columns:
      - name: date_key
        description: "Primary key — yyyymmdd integer."
        tests: [not_null, unique]
      - name: day_of_week
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6, 7]

  - name: fct_sales
    description: "Sales fact at store-day grain."
    columns:
      - name: sales_key
        description: "Surrogate primary key."
        tests: [not_null, unique]
      - name: store_key
        description: "FK to dim_store."
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_key
      - name: date_key
        description: "FK to dim_date."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: sales
        tests: [not_null]
      - name: open_flag
        tests:
          - accepted_values:
              values: [0, 1]
      - name: promo
        tests:
          - accepted_values:
              values: [0, 1]
